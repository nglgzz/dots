# /org/gnome/desktop/

[background]
color-shading-type='solid'
picture-options='zoom'
picture-uri='file:///usr/share/backgrounds/gnome/pixel-pusher-l.jxl'
picture-uri-dark='file:///usr/share/backgrounds/gnome/pixel-pusher-d.jxl'
primary-color='#967864'
secondary-color='#000000'

[screensaver]
color-shading-type='solid'
picture-options='zoom'
picture-uri='file:///usr/share/backgrounds/gnome/pixel-pusher-l.jxl'
primary-color='#967864'
secondary-color='#000000'

[input-sources]
current=uint32 0
mru-sources=[('xkb', 'us')]
per-window=true
show-all-sources=true
sources=[('xkb', 'us'), ('xkb', 'it'), ('xkb', 'se')]
xkb-options=['ctrl:nocaps']

[interface]
accent-color='orange'
color-scheme='prefer-dark'
enable-hot-corners=false
font-antialiasing='grayscale'
font-hinting='slight'
gtk-enable-primary-paste=true
gtk-theme='Adwaita'
icon-theme='Adwaita'
show-battery-percentage=true

[peripherals/mouse]
natural-scroll=false

[peripherals/touchpad]
speed=0.29182879377431914
tap-to-click=true
two-finger-scrolling-enabled=true

[wm/keybindings]
begin-move=@as []
begin-resize=@as []
close=@as []
maximize=@as []
minimize=@as []
move-to-monitor-down=@as []
move-to-monitor-left=@as []
move-to-monitor-right=@as []
move-to-monitor-up=@as []
move-to-workspace-1=['<Control><Super>q']
move-to-workspace-2=['<Control><Super>w']
move-to-workspace-3=['<Control><Super>e']
move-to-workspace-down=@as []
move-to-workspace-last=@as []
move-to-workspace-left=@as []
move-to-workspace-right=@as []
move-to-workspace-up=@as []
show-desktop=@as []
switch-applications=@as []
switch-applications-backward=['<Shift><Super>Tab', '<Shift><Alt>Tab']
switch-group=['<Super>Above_Tab', '<Alt>Above_Tab']
switch-group-backward=['<Shift><Super>Above_Tab', '<Shift><Alt>Above_Tab']
switch-panels=@as []
switch-panels-backward=@as []
switch-to-workspace-1=['<Super>q']
switch-to-workspace-2=['<Super>w']
switch-to-workspace-3=['<Super>e']
switch-to-workspace-last=['<Super>End']
switch-to-workspace-left=@as []
switch-to-workspace-right=@as []
switch-windows=@as []
switch-windows-backward=@as []
toggle-maximized=@as []
unmaximize=@as []

[wm/preferences]
num-workspaces=3
